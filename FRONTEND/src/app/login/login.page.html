<ion-content fullscreen="true">
  <div class="bg-gradient-modern min-h-screen flex flex-col font-body-md text-on-background antialiased">
    <main class="flex-grow flex flex-col items-center justify-center p-margin-mobile md:p-margin-desktop relative overflow-hidden">
      <!-- Decorative Ambient Orbs -->
      <div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
        <div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] rounded-full bg-white opacity-10 blur-[100px]"></div>
        <div class="absolute bottom-[10%] -right-[10%] w-[60%] h-[60%] rounded-full bg-secondary opacity-20 blur-[120px]"></div>
      </div>
      <!-- Brand Header Section -->
      <div class="flex flex-col items-center justify-center mb-xl z-10 text-white text-center mt-8">
        <div class="w-20 h-20 mb-md flex items-center justify-center rounded-2xl overflow-hidden shadow-[0_8px_32px_rgba(0,0,0,0.25)] border border-white/20 bg-white/10">
          <img src="assets/images/logo.png" alt="StreamCart Logo" class="w-full h-full object-cover" />
        </div>
        <h1 class="font-headline-lg text-headline-lg tracking-tight font-bold mb-xs mt-2">StreamCart</h1>
        <p class="font-body-md text-body-md text-white/90">Belanja sambil nonton Live!</p>
      </div>
      <!-- Login Card -->
      <div class="glass-card w-full max-w-md rounded-4xl p-lg md:p-xl shadow-[0_24px_48px_rgba(0,0,0,0.12)] z-10 relative mb-8">
        <div class="mb-lg">
          <h2 class="font-headline-md text-headline-md text-on-background mb-xs">Selamat Datang</h2>
          <p class="font-body-sm text-body-sm text-on-surface-variant">Silakan login ke akun Anda.</p>
        </div>
        <form (ngSubmit)="login()" class="space-y-md">
          <!-- Username Input -->
          <div class="relative input-glow rounded-xl bg-surface-container-low border border-outline-variant transition-all duration-300 group">
            <div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none">
              <span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors">person</span>
            </div>
            <input class="w-full bg-transparent border-none rounded-xl py-md pl-[48px] pr-md font-body-md text-body-md text-on-background placeholder:text-outline focus:ring-0 outline-none" name="email" [(ngModel)]="email" placeholder="Alamat Email" required type="email"/>
          </div>
          <!-- Password Input -->
          <div class="relative input-glow rounded-xl bg-surface-container-low border border-outline-variant transition-all duration-300 group">
            <div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none">
              <span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors">lock</span>
            </div>
            <input class="w-full bg-transparent border-none rounded-xl py-md pl-[48px] pr-md font-body-md text-body-md text-on-background placeholder:text-outline focus:ring-0 outline-none" name="password" [(ngModel)]="password" placeholder="••••••••" required type="password"/>
          </div>
          <!-- Forgot Password Link -->
          <div class="flex justify-end">
            <a routerLink="/forgot-password" class="font-label-lg text-label-lg text-primary hover:text-primary-container transition-colors" href="#">Lupa Password?</a>
          </div>
          


          <!-- Main CTA -->
          <button class="w-full py-md rounded-xl bg-gradient-to-r from-primary to-secondary text-white font-label-lg text-label-lg font-bold shadow-[0_12px_24px_rgba(0,88,190,0.15)] hover:shadow-[0_16px_32px_rgba(0,88,190,0.25)] hover:opacity-95 active:scale-[0.98] transition-all duration-300 mt-2" type="submit">
            MASUK
          </button>
        </form>

        <!-- Sign Up Prompt -->
        <div class="mt-lg text-center">
          <span class="font-body-sm text-body-sm text-on-surface-variant">Belum punya akun?</span>
          <a routerLink="/register" class="font-label-lg text-label-lg text-primary hover:text-primary-container transition-colors ml-xs font-semibold" href="#">Daftar sekarang</a>
        </div>
        <!-- Privacy Policy Link -->
        <div class="mt-sm text-center">
          <span class="font-body-sm text-body-sm text-on-surface-variant">Dengan masuk, Anda menyetujui</span>
          <a routerLink="/privacy-policy" class="font-label-lg text-label-lg text-primary hover:text-primary-container transition-colors ml-xs font-semibold">Kebijakan Privasi</a>
          <span class="font-body-sm text-body-sm text-on-surface-variant"> kami.</span>
        </div>
      </div>
    </main>
  </div>
</ion-content>
