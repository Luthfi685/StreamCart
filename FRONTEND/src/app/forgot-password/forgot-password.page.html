<ion-content fullscreen="true">
  <div class="bg-surface-container-lowest md:bg-surface text-on-surface font-body-md antialiased min-h-screen flex flex-col selection:bg-primary-fixed selection:text-on-primary-fixed">
    <div class="bg-primary text-on-primary w-full pt-16 pb-24 md:pb-32 flex flex-col items-center justify-center relative shrink-0 overflow-hidden glass-header">
      <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMSIgY3k9IjEiIHI9IjEiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wNSkiLz48L3N2Zz4=')] opacity-50 mix-blend-overlay"></div>
      <div class="relative z-10 flex items-center gap-2.5 animate-fade-in-down">
        <div class="w-10 h-10 bg-white/20 backdrop-blur-md rounded-xl flex items-center justify-center shadow-inner">
          <span class="material-symbols-outlined text-[28px] text-white" style="font-variation-settings: 'FILL' 1;">play_circle</span>
        </div>
        <span class="font-headline-lg-mobile text-headline-lg-mobile tracking-tight">StreamCart</span>
      </div>
    </div>
    <main class="flex-grow flex flex-col items-center w-full px-4 md:px-margin-desktop">
      <div class="w-full max-w-[420px] bg-surface-container-lowest rounded-t-[32px] md:rounded-[24px] -mt-10 p-8 md:p-10 shadow-[0_-8px_32px_rgba(0,88,190,0.06)] md:shadow-[0_12px_48px_rgba(0,88,190,0.08)] relative z-20 flex flex-col transition-all duration-300">
        <div class="text-center mb-8">
          <div class="w-12 h-12 bg-primary-fixed rounded-full flex items-center justify-center mx-auto mb-4 shadow-sm shadow-primary/5">
            <span class="material-symbols-outlined text-primary text-[24px]" style="font-variation-settings: 'FILL' 0;">lock_reset</span>
          </div>
          <h1 class="font-headline-md text-headline-md text-on-surface mb-2">Lupa Password?</h1>
          <p class="font-body-sm text-body-sm text-on-surface-variant max-w-[280px] mx-auto leading-relaxed">
            Masukkan email Anda untuk menerima instruksi pemulihan kata sandi.
          </p>
        </div>
        <form *ngIf="step === 1" class="w-full flex flex-col" (ngSubmit)="requestOtp()">
          <div class="relative w-full mb-8 group">
            <label class="sr-only" for="email">Alamat Email</label>
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors duration-300 pointer-events-none">mail</span>
            <input [(ngModel)]="email" name="email" class="w-full pl-12 pr-4 py-3.5 bg-surface-container rounded-xl border border-outline-variant/60 focus:border-primary focus:ring-4 focus:ring-primary/10 hover:border-outline transition-all outline-none font-body-md text-on-surface placeholder:text-outline/70 shadow-sm shadow-black/5" id="email" placeholder="Email terdaftar" required type="email"/>
          </div>
          <button class="w-full py-3.5 bg-gradient-to-r from-primary to-secondary text-on-primary rounded-xl font-label-lg text-label-lg shadow-[0_8px_16px_rgba(0,88,190,0.15)] hover:shadow-[0_12px_24px_rgba(0,88,190,0.2)] hover:-translate-y-0.5 active:translate-y-0 active:scale-[0.98] transition-all duration-300 mb-8 flex items-center justify-center gap-2 overflow-hidden relative" type="submit">
            <div class="absolute inset-0 bg-white/20 translate-y-full hover:translate-y-0 transition-transform duration-300 ease-out"></div>
            <span class="relative z-10">Kirim Kode OTP</span>
            <span class="material-symbols-outlined text-[18px] relative z-10">arrow_forward</span>
          </button>
          <div class="text-center mt-2">
            <a routerLink="/login" class="inline-flex items-center justify-center gap-1.5 text-primary font-label-md text-label-md hover:text-secondary hover:underline underline-offset-4 transition-all group py-2 px-4 rounded-lg hover:bg-primary-fixed/30 active:bg-primary-fixed/50" href="#">
              <span class="material-symbols-outlined text-[18px] group-hover:-translate-x-1 transition-transform duration-300">arrow_back</span>
              <span>Kembali ke Masuk</span>
            </a>
          </div>
        </form>

        <form *ngIf="step === 2" class="w-full flex flex-col" (ngSubmit)="resetPassword()">
          <div class="relative w-full mb-4 group">
            <label class="sr-only" for="otpCode">Kode OTP</label>
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors duration-300 pointer-events-none">pin</span>
            <input [(ngModel)]="otpCode" name="otpCode" class="w-full pl-12 pr-4 py-3.5 bg-surface-container rounded-xl border border-outline-variant/60 focus:border-primary focus:ring-4 focus:ring-primary/10 hover:border-outline transition-all outline-none font-body-md text-on-surface placeholder:text-outline/70 shadow-sm shadow-black/5" id="otpCode" placeholder="Masukkan 6 Digit OTP" required type="text" maxlength="6"/>
          </div>
          <div class="relative w-full mb-8 group">
            <label class="sr-only" for="newPassword">Password Baru</label>
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors duration-300 pointer-events-none">lock</span>
            <input [(ngModel)]="newPassword" name="newPassword" class="w-full pl-12 pr-4 py-3.5 bg-surface-container rounded-xl border border-outline-variant/60 focus:border-primary focus:ring-4 focus:ring-primary/10 hover:border-outline transition-all outline-none font-body-md text-on-surface placeholder:text-outline/70 shadow-sm shadow-black/5" id="newPassword" placeholder="Password Baru (min 6 karakter)" required type="password"/>
          </div>
          <button class="w-full py-3.5 bg-gradient-to-r from-primary to-secondary text-on-primary rounded-xl font-label-lg text-label-lg shadow-[0_8px_16px_rgba(0,88,190,0.15)] hover:shadow-[0_12px_24px_rgba(0,88,190,0.2)] hover:-translate-y-0.5 active:translate-y-0 active:scale-[0.98] transition-all duration-300 mb-8 flex items-center justify-center gap-2 overflow-hidden relative" type="submit">
            <div class="absolute inset-0 bg-white/20 translate-y-full hover:translate-y-0 transition-transform duration-300 ease-out"></div>
            <span class="relative z-10">Simpan Password Baru</span>
            <span class="material-symbols-outlined text-[18px] relative z-10">check_circle</span>
          </button>
          <div class="text-center mt-2">
            <button type="button" (click)="step = 1" class="inline-flex items-center justify-center gap-1.5 text-primary font-label-md text-label-md hover:text-secondary hover:underline underline-offset-4 transition-all group py-2 px-4 rounded-lg hover:bg-primary-fixed/30 active:bg-primary-fixed/50">
              <span class="material-symbols-outlined text-[18px] group-hover:-translate-x-1 transition-transform duration-300">arrow_back</span>
              <span>Ganti Email</span>
            </button>
          </div>
        </form>
      </div>
    </main>
  </div>
</ion-content>
